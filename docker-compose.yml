version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: mindmorph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindmorph
      POSTGRES_PASSWORD: mindmorph
      POSTGRES_DB: mindmorph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mindmorph-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: mindmorph-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma

volumes:
  pgdata:
  redisdata:
  chromadata:
