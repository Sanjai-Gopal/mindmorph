version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: mindmorph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindmorph
      POSTGRES_PASSWORD: mindmorph
      POSTGRES_DB: mindmorph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mindmorph-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: mindmorph-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mindmorph-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    ports:
      - "3000:3000"
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: mindmorph-server
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://mindmorph:mindmorph@postgres:5432/mindmorph}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CHROMA_URL: ${CHROMA_URL:-http://chromadb:8000}
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - chromadb

volumes:
  pgdata:
  redisdata:
  chromadata:
